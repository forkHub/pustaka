<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Soal Pengurangan Tanpa Meminjam</title>
  <style>
    body {
      font-family: monospace;
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }
    .soal {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container" id="soalContainer"></div>

  <script>
    function generateNoBorrowPair(length = 5) {
      let a = "";
      let b = "";
      for (let i = 0; i < length; i++) {
        const d1 = Math.floor(Math.random() * 10); // digit atas
        const d2 = Math.floor(Math.random() * (d1 + 1)); // digit bawah ≤ d1
        a += d1;
        b += d2;
      }
      return [a, b];
    }

    function createSoalElement(a, b) {
      const div = document.createElement("div");
      div.className = "soal";
      div.innerHTML = `
        ${a}<br>
        ${b}<br>
        ------ -<br>
        .......
      `;
      return div;
    }

    const container = document.getElementById("soalContainer");
    for (let i = 0; i < 10; i++) {
      const [a, b] = generateNoBorrowPair(5);
      container.appendChild(createSoalElement(a, b));
    }
  </script>
</body>
</html>
