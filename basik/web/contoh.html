<html>
<meta charset="utf-8" />

<head>
	<style>
		canvas {
			border: 1px solid gray;
			background-color: white;
		}

		html,
		body {
			margin: 0px;
			padding: 0px;
			background-color: lightGray;
		}

		.custom-alert-overlay {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.5);
			display: none;
			/* awalnya hidden */
			justify-content: center;
			align-items: center;
			z-index: 9999;
		}

		.custom-alert-box {
			background: #fff;
			padding: 20px;
			border-radius: 8px;
			min-width: 250px;
			text-align: center;
			box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
		}

		.custom-alert-box button {
			margin-top: 15px;
			padding: 8px 16px;
			border: none;
			background: #0078d7;
			color: #fff;
			border-radius: 4px;
			cursor: pointer;
		}
	</style>
	<script>
		function __loadScriptsSequentially(sources, finalCallback) {
			console.log("data:", sources);

			function __loadNext(index) {

				if (index >= sources.length) {
					if (typeof finalCallback === 'function') finalCallback();
					return;
				}

				const script = document.createElement('script');
				script.src = sources[index];
				script.onload = () => __loadNext(index + 1);
				script.onerror = () => {
					console.error("Failed to load: " + sources[index]);
					__loadNext(index + 1); // Skip failed script and continue
				};

				console.log("load script " + script.src);
				document.head.appendChild(script);
			}

			__loadNext(0);
		}

		// Example usage:
		const __params = new URLSearchParams(window.location.search);
		let __rand = Math.floor(Math.random() * 1000);
		let __src = __params?.get('src');
		let __data = [
			`./editor/lib/basik.min.js?r=${__rand}`,
			`./editor/lib/mulai.js?r=${__rand}`,
		];
		if (__src) __data.push(__src);

		__loadScriptsSequentially(__data, () => {
			console.log('load complete ');
			// const script = document.createElement('script');
			// script.textContent = `${script}`
			// document.head.appendChild(script);
		});

	</script>
</head>
